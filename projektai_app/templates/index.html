{% extends 'base.html' %}

{% block content %}
<h4>Projektų lentelė</h4>
<table>
    <thead>
    <tr>
        <th>id</th>
        <th>pavadinimas</th>
        <th>plotas</th>
        <th>kaina</th>
        <th>kaina pvm</th>
        <th>1kv kaina</th>
        <th>veiksmai</th>
    </tr>
    </thead>
    <tbody>
    {% for row in all_rows %}
    <tr>
        <td>{{ row.id }}</td>
        <td>{{ row.pavadinimas }}</td>
        <td>{{ row.plotas }}</td>
        <td>{{ row.kaina }}</td>
        <td>{{ row.kaina_pvm }}</td>
        <td>{{ row.kv1_kaina }}</td>
        <td><a class="btn" href="/projektai/{{ row.id }}">žiūrėti</a>
        </td>

    </tr>
    {% endfor %}
    </tbody>
</table>

{% endblock %}
